[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = mbed
build_flags = 
    -I src/lib/c610
    -I src/lib/FP
    -I src/lib/key
    -I src/lib/pid
    -I src/lib/second_nucleo
    -I src/lib/serial_read
    -I src/lib/solenoid
    -I src/lib/stateMachine
    -I src/lib/QEI
    -I src/lib/BNO055Uart
    -I src/lib/WT901